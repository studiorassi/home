<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login · Studio Rassi</title>
  
  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Work+Sans:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2C0714;
      color: #f5edea;
      font-family: 'Work Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: radial-gradient(ellipse at 50% 30%, rgba(212, 163, 179, 0.04) 0%, transparent 70%);
    }
    .login-container {
      background: rgba(31, 5, 16, 0.85);
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(212, 163, 179, 0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .login-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 50% 20%, rgba(212, 163, 179, 0.03) 0%, transparent 60%);
      animation: rotateGlow 40s linear infinite;
      pointer-events: none;
    }
    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }
    .login-header .logo {
      display: inline-block;
      line-height: 0;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .login-header .logo img {
      display: block;
      width: auto;
      height: 70px;
      max-width: 200px;
      margin: 0 auto;
      transition: all 0.3s ease;
    }
    .login-header .logo img:hover {
      opacity: 0.85;
      transform: scale(1.02);
    }
    .login-header p {
      color: #d4c5c0;
      font-weight: 300;
      font-size: 0.9rem;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }
    .login-header .icon {
      font-size: 2.8rem;
      color: #D4A3B3;
      margin-bottom: 8px;
      display: none;
    }
    .form-group {
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #d4c5c0;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-dark {
      background: rgba(44, 7, 20, 0.6);
      border: 1px solid rgba(212, 163, 179, 0.15);
      padding: 14px 18px;
      border-radius: 40px;
      color: #f5edea;
      font-family: 'Work Sans', sans-serif;
      width: 100%;
      font-size: 0.95rem;
      transition: 0.3s;
      padding-right: 48px;
    }
    .input-dark:focus {
      outline: none;
      border-color: #D4A3B3;
      box-shadow: 0 0 0 3px rgba(212, 163, 179, 0.1);
    }
    .input-dark::placeholder { color: #7a5f5a; }
    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #7a5f5a;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s;
      padding: 4px;
    }
    .toggle-password:hover {
      color: #D4A3B3;
    }
    .btn-login {
      width: 100%;
      padding: 16px;
      background: #D4A3B3;
      color: #2C0714;
      border: none;
      border-radius: 50px;
      font-family: 'Work Sans', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
      position: relative;
      z-index: 1;
      letter-spacing: 0.5px;
    }
    .btn-login:hover {
      background: #c08b9e;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212, 163, 179, 0.3);
    }
    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: #7a5f5a;
      position: relative;
      z-index: 1;
    }
    .login-footer .heart {
      color: #D4A3B3;
      display: inline-block;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    .login-footer a {
      color: #D4A3B3;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }
    .login-footer a:hover { text-decoration: underline; }
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #d4c5c0;
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 16px;
      transition: 0.3s;
      position: relative;
      z-index: 1;
    }
    .back-home:hover { color: #D4A3B3; }
    .error-message {
      color: #e74c3c;
      font-size: 0.8rem;
      margin-top: 4px;
      display: none;
    }
    .error-message.show { display: block; }
    .success-message {
      color: #2ecc71;
      font-size: 0.8rem;
      margin-top: 4px;
      display: none;
    }
    .success-message.show { display: block; }

    /* ===== FORGOT PASSWORD MODAL ===== */
    .forgot-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      z-index: 9998;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .forgot-modal.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    .forgot-modal .login-container {
      max-width: 400px;
      padding: 32px 28px;
    }

    @media (max-width: 480px) {
      .login-container { padding: 32px 24px; }
      .login-header .logo img { height: 55px; }
      .login-footer { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<!-- ===== LOGIN CONTAINER ===== -->
<div class="login-container">
  <a href="https://studiorassi.github.io/home/index.html" class="back-home">
    <i class="fas fa-arrow-left"></i> Voltar ao site
  </a>
  
  <div class="login-header">
    <a href="https://studiorassi.github.io/home/index.html" class="logo">
      <img src="assets/images/logo/logo.png" 
           alt="Studio Rassi · Photo & Video" 
           width="200" 
           height="70"
           loading="lazy">
    </a>
    <p>Acesse suas memórias eternizadas</p>
  </div>

  <!-- ===== FORMULÁRIO ===== -->
  <form id="authForm">
    <div class="form-group">
      <label><i class="fas fa-envelope" style="color:#D4A3B3; margin-right:6px;"></i> E-mail</label>
      <input type="email" id="emailInput" class="input-dark" placeholder="seu@email.com" required>
    </div>

    <div class="form-group">
      <label><i class="fas fa-key" style="color:#D4A3B3; margin-right:6px;"></i> Senha</label>
      <div class="input-wrapper">
        <input type="password" id="passwordInput" class="input-dark" placeholder="••••••••" required minlength="6">
        <button type="button" class="toggle-password" onclick="togglePassword('passwordInput', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <span class="forgot-link" style="display:block; text-align:right; font-size:0.75rem; margin-top:4px; color:#7a5f5a; cursor:pointer; transition:0.3s;" onclick="openForgotModal()">
        <i class="fas fa-question-circle"></i> Esqueci minha senha
      </span>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <button type="submit" class="btn-login" id="submitBtn">
      <i class="fas fa-sign-in-alt"></i> Entrar
    </button>
  </form>

  <div class="login-footer">
    <p>
      Acesse acima com o login e senha entregues especialmente pra você 
      <span class="heart">💖</span>
    </p>
    <p style="margin-top:8px; font-size:0.7rem; color:#7a5f5a;">
      🔒 Protegido com criptografia e autenticação JWT
    </p>
  </div>
</div>

<!-- ===== FORGOT PASSWORD MODAL ===== -->
<div class="forgot-modal" id="forgotModal">
  <div class="login-container">
    <div class="login-header">
      <i class="fas fa-key icon" style="font-size: 2.5rem; color: #D4A3B3; display: block; margin-bottom: 8px;"></i>
      <h3 style="font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.4rem; color: #f5edea; margin-top: 4px;">Recuperar senha</h3>
      <p style="color: #d4c5c0; font-size: 0.85rem; margin-top: 4px;">Digite seu email para receber o link de redefinição</p>
    </div>
    <form id="forgotForm">
      <div class="form-group">
        <label><i class="fas fa-envelope" style="color:#D4A3B3; margin-right:6px;"></i> E-mail</label>
        <input type="email" id="forgotEmail" class="input-dark" placeholder="seu@email.com" required>
      </div>
      <div id="forgotMessage" class="success-message"></div>
      <div id="forgotError" class="error-message"></div>
      <button type="submit" class="btn-login" id="forgotBtn">
        <i class="fas fa-paper-plane"></i> Enviar link
      </button>
      <button type="button" style="display:block; margin-top:12px; background:transparent; border:none; color:#7a5f5a; cursor:pointer; font-size:0.8rem; width:100%; text-align:center;" onclick="closeForgotModal()">
        <i class="fas fa-arrow-left"></i> Voltar ao login
      </button>
    </form>
  </div>
</div>

<script>
  // ============================================================
  // CONFIGURAÇÃO
  // ============================================================
  const API_BASE_URL = 'https://api-studiorassi.onrender.com';

  // ============================================================
  // DOM ELEMENTS
  // ============================================================
  const form = document.getElementById('authForm');
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const submitBtn = document.getElementById('submitBtn');
  const errorMessage = document.getElementById('errorMessage');
  const successMessage = document.getElementById('successMessage');

  // ============================================================
  // TOGGLE PASSWORD VISIBILITY
  // ============================================================
  function togglePassword(inputId, button) {
    const input = document.getElementById(inputId);
    const icon = button.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  }

  // ============================================================
  // FORGOT PASSWORD
  // ============================================================
  function openForgotModal() {
    document.getElementById('forgotModal').classList.add('active');
    document.getElementById('forgotMessage').classList.remove('show');
    document.getElementById('forgotError').classList.remove('show');
    document.getElementById('forgotEmail').value = emailInput.value || '';
  }

  function closeForgotModal() {
    document.getElementById('forgotModal').classList.remove('active');
  }

  // Fecha modal ao clicar fora
  document.getElementById('forgotModal').addEventListener('click', function(e) {
    if (e.target === this) closeForgotModal();
  });

  // ============================================================
  // SUBMISSÃO DO FORMULÁRIO (apenas login)
  // ============================================================
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    errorMessage.classList.remove('show');
    successMessage.classList.remove('show');
    
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    
    if (!email || !password) {
      showError('Preencha todos os campos obrigatórios.');
      return;
    }
    
    if (password.length < 6) {
      showError('A senha deve ter pelo menos 6 caracteres.');
      return;
    }
    
    await loginUser(email, password);
  });

  // ============================================================
  // FORGOT PASSWORD SUBMISSION
  // ============================================================
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('forgotEmail').value.trim();
    const message = document.getElementById('forgotMessage');
    const error = document.getElementById('forgotError');
    const btn = document.getElementById('forgotBtn');
    
    message.classList.remove('show');
    error.classList.remove('show');
    
    if (!email) {
      error.textContent = 'Digite seu email.';
      error.classList.add('show');
      return;
    }
    
    try {
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
      
      const response = await fetch(`${API_BASE_URL}/api/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      
      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.message || 'Erro ao enviar solicitação');
      }
      
      message.textContent = data.message || 'Link de redefinição enviado! Verifique seu email.';
      message.classList.add('show');
      
      if (data.devLink) {
        message.textContent += `\n\n🔗 Link de teste: ${data.devLink}`;
      }
      
      setTimeout(() => {
        closeForgotModal();
      }, 3000);
      
    } catch (err) {
      error.textContent = err.message;
      error.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar link';
    }
  });

  // ============================================================
  // FUNÇÕES DE AUTENTICAÇÃO
  // ============================================================
  async function loginUser(email, password) {
    try {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
      
      const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      
      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.message || 'Erro ao fazer login');
      }
      
      // Salva o token e os dados do usuário
      localStorage.setItem('token', data.data.token);
      localStorage.setItem('user', JSON.stringify(data.data.user));
      
      showSuccess('✅ Login realizado com sucesso! Redirecionando...');
      
      // Redireciona para a área do cliente
      setTimeout(() => {
        window.location.href = 'https://studiorassi.github.io/home/cliente/cliente.html';
      }, 1500);
      
    } catch (error) {
      showError(error.message);
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
    }
  }

  // ============================================================
  // MENSAGENS
  // ============================================================
  function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.add('show');
    successMessage.classList.remove('show');
  }

  function showSuccess(message) {
    successMessage.textContent = message;
    successMessage.classList.add('show');
    errorMessage.classList.remove('show');
  }

  // ============================================================
  // VERIFICAR SE JÁ ESTÁ LOGADO
  // ============================================================
  const token = localStorage.getItem('token');
  if (token) {
    // Verifica se o token é válido
    fetch(`${API_BASE_URL}/api/auth/me`, {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(response => {
      if (response.ok) {
        window.location.href = 'https://studiorassi.github.io/home/cliente/cliente.html';
      } else {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
      }
    })
    .catch(() => {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
    });
  }
</script>

</body>
</html>
