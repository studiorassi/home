<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login · Studio Rassi</title>
  
  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Work+Sans:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2C0714;
      color: #f5edea;
      font-family: 'Work Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: radial-gradient(ellipse at 50% 30%, rgba(212, 163, 179, 0.04) 0%, transparent 70%);
    }
    .login-container {
      background: rgba(31, 5, 16, 0.85);
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(212, 163, 179, 0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .login-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 50% 20%, rgba(212, 163, 179, 0.03) 0%, transparent 60%);
      animation: rotateGlow 40s linear infinite;
      pointer-events: none;
    }
    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }
    .login-header .logo {
      display: inline-block;
      line-height: 0;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .login-header .logo img {
      display: block;
      width: auto;
      height: 70px;
      max-width: 200px;
      margin: 0 auto;
      transition: all 0.3s ease;
    }
    .login-header .logo img:hover {
      opacity: 0.85;
      transform: scale(1.02);
    }
    .login-header p {
      color: #d4c5c0;
      font-weight: 300;
      font-size: 0.9rem;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }
    .form-group {
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #d4c5c0;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-dark {
      background: rgba(44, 7, 20, 0.6);
      border: 1px solid rgba(212, 163, 179, 0.15);
      padding: 14px 18px;
      border-radius: 40px;
      color: #f5edea;
      font-family: 'Work Sans', sans-serif;
      width: 100%;
      font-size: 0.95rem;
      transition: 0.3s;
      padding-right: 48px;
    }
    .input-dark:focus {
      outline: none;
      border-color: #D4A3B3;
      box-shadow: 0 0 0 3px rgba(212, 163, 179, 0.1);
    }
    .input-dark::placeholder { color: #7a5f5a; }
    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #7a5f5a;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s;
      padding: 4px;
    }
    .toggle-password:hover {
      color: #D4A3B3;
    }
    .btn-login {
      width: 100%;
      padding: 16px;
      background: #D4A3B3;
      color: #2C0714;
      border: none;
      border-radius: 50px;
      font-family: 'Work Sans', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
      position: relative;
      z-index: 1;
      letter-spacing: 0.5px;
    }
    .btn-login:hover {
      background: #c08b9e;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212, 163, 179, 0.3);
    }
    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: #7a5f5a;
      position: relative;
      z-index: 1;
    }
    .login-footer .heart {
      color: #D4A3B3;
      display: inline-block;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #d4c5c0;
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 16px;
      transition: 0.3s;
      position: relative;
      z-index: 1;
    }
    .back-home:hover { color: #D4A3B3; }
    .error-message {
      color: #e74c3c;
      font-size: 0.8rem;
      margin-top: 4px;
      display: none;
    }
    .error-message.show { display: block; }
    .success-message {
      color: #2ecc71;
      font-size: 0.8rem;
      margin-top: 4px;
      display: none;
    }
    .success-message.show { display: block; }

    @media (max-width: 480px) {
      .login-container { padding: 32px 24px; }
      .login-header .logo img { height: 55px; }
      .login-footer { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<!-- ===== LOGIN CONTAINER ===== -->
<div class="login-container">
  <a href="https://studiorassi.github.io/home/index.html" class="back-home">
    <i class="fas fa-arrow-left"></i> Voltar ao site
  </a>
  
  <div class="login-header">
    <a href="https://studiorassi.github.io/home/index.html" class="logo">
      <img src="assets/images/logo/logo.png" 
           alt="Studio Rassi · Photo & Video" 
           width="200" 
           height="70"
           loading="lazy">
    </a>
    <p>Acesse suas memórias eternizadas</p>
  </div>

  <!-- ===== FORMULÁRIO ===== -->
  <form id="authForm">
    <div class="form-group">
      <label><i class="fas fa-user" style="color:#D4A3B3; margin-right:6px;"></i> Login</label>
      <input type="text" id="loginInput" class="input-dark" placeholder="Digite seu login" required>
    </div>

    <div class="form-group">
      <label><i class="fas fa-key" style="color:#D4A3B3; margin-right:6px;"></i> Senha</label>
      <div class="input-wrapper">
        <input type="password" id="passwordInput" class="input-dark" placeholder="••••••••" required>
        <button type="button" class="toggle-password" onclick="togglePassword('passwordInput', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <button type="submit" class="btn-login" id="submitBtn">
      <i class="fas fa-sign-in-alt"></i> Entrar
    </button>
  </form>

  <div class="login-footer">
    <p>
      Acesse acima com o login e senha entregues especialmente pra você 
      <span class="heart">💖</span>
    </p>
    <p style="margin-top:8px; font-size:0.7rem; color:#7a5f5a;">
      🔒 Ambiente seguro e exclusivo para suas memórias
    </p>
  </div>
</div>

<script>
  // ============================================================
  // CREDENCIAIS FIXAS (GERADAS POR VOCÊ)
  // ============================================================
  const VALID_LOGIN = 'lucille_e_edson';
  const VALID_PASSWORD = '072026_l&e';

  // ============================================================
  // DOM ELEMENTS
  // ============================================================
  const form = document.getElementById('authForm');
  const loginInput = document.getElementById('loginInput');
  const passwordInput = document.getElementById('passwordInput');
  const submitBtn = document.getElementById('submitBtn');
  const errorMessage = document.getElementById('errorMessage');
  const successMessage = document.getElementById('successMessage');

  // ============================================================
  // TOGGLE PASSWORD
  // ============================================================
  function togglePassword(inputId, button) {
    const input = document.getElementById(inputId);
    const icon = button.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  }

  // ============================================================
  // SUBMISSÃO DO FORMULÁRIO
  // ============================================================
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    errorMessage.classList.remove('show');
    successMessage.classList.remove('show');
    
    const login = loginInput.value.trim();
    const password = passwordInput.value;
    
    if (!login || !password) {
      showError('Preencha todos os campos obrigatórios.');
      return;
    }
    
    // ============================================================
    // VERIFICAÇÃO DAS CREDENCIAIS FIXAS
    // ============================================================
    if (login === VALID_LOGIN && password === VALID_PASSWORD) {
      // Login bem-sucedido
      showSuccess('✅ Acesso liberado! Redirecionando...');
      
      // Armazena um token simples (apenas para controle de sessão)
      // Em um ambiente real, isso viria do back-end
      const fakeToken = 'user_' + Date.now();
      localStorage.setItem('token', fakeToken);
      localStorage.setItem('user', JSON.stringify({
        name: 'Lucille e Edson',
        login: login,
        credits: 30
      }));
      
      // Redireciona para a área do cliente após 1.5 segundos
      setTimeout(() => {
        window.location.href = 'https://studiorassi.github.io/home/cliente/cliente.html';
      }, 1500);
      
    } else {
      // Login ou senha inválidos
      showError('❌ Login ou senha inválidos. Verifique os dados fornecidos.');
    }
  });

  // ============================================================
  // MENSAGENS
  // ============================================================
  function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.add('show');
    successMessage.classList.remove('show');
  }

  function showSuccess(message) {
    successMessage.textContent = message;
    successMessage.classList.add('show');
    errorMessage.classList.remove('show');
  }

  // ============================================================
  // VERIFICAR SE JÁ ESTÁ LOGADO
  // ============================================================
  const token = localStorage.getItem('token');
  if (token) {
    // Verifica se o token é válido (simples verificação local)
    const userData = localStorage.getItem('user');
    if (userData) {
      try {
        const user = JSON.parse(userData);
        if (user && user.login === VALID_LOGIN) {
          window.location.href = 'https://studiorassi.github.io/home/cliente/cliente.html';
        }
      } catch (e) {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
      }
    } else {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
    }
  }

  // ============================================================
  // ENTER PARA SUBMETER O FORMULÁRIO
  // ============================================================
  passwordInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      form.dispatchEvent(new Event('submit'));
    }
  });

  loginInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      passwordInput.focus();
    }
  });

  console.log('🔐 Sistema de login ativado!');
  console.log('📝 Use as credenciais fornecidas para acessar.');
</script>

</body>
</html>
