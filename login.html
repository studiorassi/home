<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Studio Rassi</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2C0714;
      color: #f5edea;
      font-family: 'Work Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: #1f0510;
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(212, 163, 179, 0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      position: relative;
    }
    
    /* ===== BOTÃO VOLTAR ===== */
    .btn-back {
      position: absolute;
      top: 20px;
      left: 20px;
      background: transparent;
      border: 1px solid rgba(212, 163, 179, 0.15);
      color: #d4c5c0;
      padding: 8px 14px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-family: 'Work Sans', sans-serif;
    }
    .btn-back:hover {
      border-color: #D4A3B3;
      color: #f5edea;
      background: rgba(212, 163, 179, 0.05);
    }
    .btn-back i {
      font-size: 0.8rem;
      color: #D4A3B3;
    }
    
    .login-container .logo {
      display: block;
      width: 180px;
      height: auto;
      margin: 8px auto 20px;
    }
    .login-container h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 4px;
    }
    .login-container .subtitle {
      text-align: center;
      color: #d4c5c0;
      font-weight: 300;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .login-container .subtitle span {
      color: #D4A3B3;
      font-weight: 500;
    }
    
    /* ===== CAMPOS COM ÍCONES - NOVA ABORDAGEM ===== */
    .login-container .form-group {
      margin-bottom: 20px;
    }
    .login-container label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #d4c5c0;
      margin-bottom: 6px;
    }
    
    /* ===== WRAPPER DO INPUT ===== */
    .login-container .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      background: #2C0714;
      border: 1px solid rgba(212, 163, 179, 0.12);
      border-radius: 40px;
      transition: 0.3s;
    }
    .login-container .input-wrapper:focus-within {
      border-color: #D4A3B3;
      box-shadow: 0 0 0 3px rgba(212, 163, 179, 0.1);
    }
    
    /* ===== ÍCONE DA ESQUERDA ===== */
    .login-container .input-wrapper .icon-left {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 0 0 18px;
      color: #D4A3B3;
      font-size: 1rem;
      opacity: 0.6;
      flex-shrink: 0;
      min-width: 36px;
    }
    
    /* ===== INPUT ===== */
    .login-container .input-wrapper input {
      flex: 1;
      padding: 14px 12px;
      background: transparent;
      border: none;
      color: #f5edea;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      min-width: 0;
    }
    .login-container .input-wrapper input::placeholder {
      color: #7a5f5a;
    }
    
    /* ===== BOTÃO DE MOSTRAR SENHA ===== */
    .login-container .input-wrapper .toggle-password {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px 0 0;
      background: transparent;
      border: none;
      color: #D4A3B3;
      font-size: 1rem;
      opacity: 0.6;
      cursor: pointer;
      transition: 0.3s;
      flex-shrink: 0;
      min-width: 36px;
    }
    .login-container .input-wrapper .toggle-password:hover {
      opacity: 1;
      color: #f5edea;
    }
    
    /* ===== BOTÃO LOGIN ===== */
    .login-container .btn-login {
      width: 100%;
      padding: 16px;
      background: #D4A3B3;
      color: #2C0714;
      border: none;
      border-radius: 40px;
      font-family: 'Work Sans', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
    }
    .login-container .btn-login:hover {
      background: #c08b9e;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212, 163, 179, 0.3);
    }
    .login-container .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    /* ===== MENSAGEM DE ERRO ===== */
    .login-container .error-msg {
      color: #D4A3B3;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 16px;
      display: none;
    }
    .login-container .error-msg.show {
      display: block;
    }
    
    .login-container .info {
      text-align: center;
      font-size: 0.7rem;
      color: #7a5f5a;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(212, 163, 179, 0.06);
    }
    .login-container .info i {
      color: #D4A3B3;
    }
  </style>
</head>
<body>

<div class="login-container">
  <!-- ===== BOTÃO VOLTAR ===== -->
  <a href="https://studiorassi.github.io/home/index.html" class="btn-back">
    <i class="fas fa-arrow-left"></i> Voltar
  </a>
  
  <!-- ===== LOGO ===== -->
  <img src="assets/images/logo/logo.png" 
       alt="Studio Rassi" 
       class="logo">
  
  <h1>Área do Cliente</h1>
  <p class="subtitle">Acesse suas <span>memórias</span> em alta definição</p>
  
  <form id="loginForm">
    <!-- ===== CAMPO LOGIN ===== -->
    <div class="form-group">
      <label for="login">Login</label>
      <div class="input-wrapper">
        <span class="icon-left">
          <i class="fas fa-user"></i>
        </span>
        <input type="text" id="login" placeholder="Digite seu login" value="lucille_e_edson">
      </div>
    </div>
    
    <!-- ===== CAMPO SENHA ===== -->
    <div class="form-group">
      <label for="password">Senha</label>
      <div class="input-wrapper">
        <span class="icon-left">
          <i class="fas fa-lock"></i>
        </span>
        <input type="password" id="password" placeholder="Digite sua senha" value="072026_l&e">
        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar senha">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>
    
    <button type="submit" class="btn-login" id="loginBtn">
      <i class="fas fa-sign-in-alt"></i> Entrar
    </button>
    
    <div class="error-msg" id="loginError">
      <i class="fas fa-exclamation-circle"></i> Credenciais inválidas. Tente novamente.
    </div>
  </form>
  
  <div class="info">
    <i class="fas fa-shield-alt"></i> Ambiente seguro · Suas fotos estão protegidas
  </div>
</div>

<script>
  // ============================================================
  // CONFIGURAÇÕES
  // ============================================================
  const API_BASE_URL = 'https://api-studiorassi.onrender.com';
  
  // ============================================================
  // DOM ELEMENTS
  // ============================================================
  const form = document.getElementById('loginForm');
  const loginInput = document.getElementById('login');
  const passwordInput = document.getElementById('password');
  const togglePassword = document.getElementById('togglePassword');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('loginError');
  
  // ============================================================
  // MOSTRAR/ESCONDER SENHA
  // ============================================================
  togglePassword.addEventListener('click', function() {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    
    // Troca o ícone
    const icon = this.querySelector('i');
    if (type === 'text') {
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  });
  
  // ============================================================
  // FUNÇÃO DE LOGIN
  // ============================================================
  async function handleLogin(e) {
    e.preventDefault();
    
    const login = loginInput.value.trim();
    const password = passwordInput.value.trim();
    
    if (!login || !password) {
      errorMsg.textContent = '⚠️ Preencha todos os campos';
      errorMsg.classList.add('show');
      return;
    }
    
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
    errorMsg.classList.remove('show');
    
    try {
      // O login é o email, então usamos o login como email
      const email = login;
      
      const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      
      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.error || 'Login falhou');
      }
      
      // Salva dados da sessão
      localStorage.setItem('authToken', data.token);
      localStorage.setItem('userId', data.user.id);
      localStorage.setItem('userName', data.user.name);
      localStorage.setItem('userCredits', data.user.credits);
      
      // Redireciona para a galeria
      window.location.href = 'cliente/cliente.html';
      
    } catch (error) {
      console.error('Erro no login:', error);
      errorMsg.textContent = error.message || '❌ Credenciais inválidas. Tente novamente.';
      errorMsg.classList.add('show');
      
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
    }
  }
  
  // ============================================================
  // EVENT LISTENERS
  // ============================================================
  form.addEventListener('submit', handleLogin);
  
  // Enter key
  passwordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
  });
  
  // Limpa erro ao digitar
  loginInput.addEventListener('input', () => errorMsg.classList.remove('show'));
  passwordInput.addEventListener('input', () => errorMsg.classList.remove('show'));
  
  // ============================================================
  // VERIFICA SESSÃO EXISTENTE
  // ============================================================
  const token = localStorage.getItem('authToken');
  if (token) {
    window.location.href = 'cliente/cliente.html';
  }
  
  console.log('🔐 Página de login carregada');
  console.log('👤 Login: lucille_e_edson');
  console.log('🔑 Senha: 072026_l&e');
  console.log('📁 Logo: assets/images/logo/logo.png');
</script>

</body>
</html>
