<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Studio Rassi</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2C0714;
      color: #f5edea;
      font-family: 'Work Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: #1f0510;
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(212, 163, 179, 0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-container .logo {
      display: block;
      width: 120px;
      height: auto;
      margin: 0 auto 24px;
    }
    .login-container h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-container .subtitle {
      text-align: center;
      color: #d4c5c0;
      font-weight: 300;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .login-container .subtitle span {
      color: #D4A3B3;
      font-weight: 500;
    }
    .login-container .form-group {
      margin-bottom: 20px;
    }
    .login-container label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #d4c5c0;
      margin-bottom: 6px;
    }
    .login-container input {
      width: 100%;
      padding: 14px 18px;
      background: #2C0714;
      border: 1px solid rgba(212, 163, 179, 0.12);
      border-radius: 40px;
      color: #f5edea;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.95rem;
      transition: 0.3s;
    }
    .login-container input:focus {
      outline: none;
      border-color: #D4A3B3;
      box-shadow: 0 0 0 3px rgba(212, 163, 179, 0.1);
    }
    .login-container input::placeholder {
      color: #7a5f5a;
    }
    .login-container .btn-login {
      width: 100%;
      padding: 16px;
      background: #D4A3B3;
      color: #2C0714;
      border: none;
      border-radius: 40px;
      font-family: 'Work Sans', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
    }
    .login-container .btn-login:hover {
      background: #c08b9e;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212, 163, 179, 0.3);
    }
    .login-container .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .login-container .error-msg {
      color: #D4A3B3;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 16px;
      display: none;
    }
    .login-container .error-msg.show {
      display: block;
    }
    .login-container .info {
      text-align: center;
      font-size: 0.7rem;
      color: #7a5f5a;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(212, 163, 179, 0.06);
    }
    .login-container .info i {
      color: #D4A3B3;
    }
  </style>
</head>
<body>

<div class="login-container">
  <img src="https://studiorassi.github.io/home/assets/images/logo/logo-header.png" 
       alt="Studio Rassi" 
       class="logo">
  
  <h1>Área do Cliente</h1>
  <p class="subtitle">Acesse suas <span>memórias</span> em alta definição</p>
  
  <form id="loginForm">
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" value="lucille_edson@email.com">
    </div>
    
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" value="123456">
    </div>
    
    <button type="submit" class="btn-login" id="loginBtn">
      <i class="fas fa-lock"></i> Entrar
    </button>
    
    <div class="error-msg" id="loginError">
      <i class="fas fa-exclamation-circle"></i> Credenciais inválidas. Tente novamente.
    </div>
  </form>
  
  <div class="info">
    <i class="fas fa-shield-alt"></i> Ambiente seguro · Suas fotos estão protegidas
  </div>
</div>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<script>
  // ============================================================
  // CONFIGURAÇÕES
  // ============================================================
  const API_BASE_URL = 'https://api-studiorassi.onrender.com';
  
  // ============================================================
  // DOM ELEMENTS
  // ============================================================
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('loginError');
  
  // ============================================================
  // FUNÇÃO DE LOGIN
  // ============================================================
  async function handleLogin(e) {
    e.preventDefault();
    
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    
    if (!email || !password) {
      errorMsg.textContent = '⚠️ Preencha todos os campos';
      errorMsg.classList.add('show');
      return;
    }
    
    // Desabilita botão
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
    errorMsg.classList.remove('show');
    
    try {
      const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      
      const data = await response.json();
      
      if (!response.ok) {
        throw new Error(data.error || 'Login falhou');
      }
      
      // Salva dados da sessão
      localStorage.setItem('authToken', data.token);
      localStorage.setItem('userId', data.user.id);
      localStorage.setItem('userName', data.user.name);
      localStorage.setItem('userCredits', data.user.credits);
      
      // Redireciona para a galeria
      window.location.href = 'cliente/cliente.html';
      
    } catch (error) {
      console.error('Erro no login:', error);
      errorMsg.textContent = error.message || '❌ Credenciais inválidas. Tente novamente.';
      errorMsg.classList.add('show');
      
      // Reabilita botão
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-lock"></i> Entrar';
    }
  }
  
  // ============================================================
  // EVENT LISTENERS
  // ============================================================
  form.addEventListener('submit', handleLogin);
  
  // Enter key
  passwordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
  });
  
  // Limpa erro ao digitar
  emailInput.addEventListener('input', () => errorMsg.classList.remove('show'));
  passwordInput.addEventListener('input', () => errorMsg.classList.remove('show'));
  
  // ============================================================
  // VERIFICA SESSÃO EXISTENTE
  // ============================================================
  const token = localStorage.getItem('authToken');
  if (token) {
    // Se já tem token, tenta redirecionar
    window.location.href = 'cliente/cliente.html';
  }
  
  console.log('🔐 Página de login carregada');
  console.log('📧 Email padrão: lucille_edson@email.com');
  console.log('🔑 Senha padrão: 123456');
</script>

</body>
</html>
