<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Studio Rassi</title>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2C0714;
      color: #f5edea;
      font-family: 'Work Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .admin-container {
      background: #1f0510;
      border-radius: 32px;
      padding: 40px;
      max-width: 550px;
      width: 100%;
      border: 1px solid rgba(212, 163, 179, 0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .admin-container h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 2rem;
      text-align: center;
      color: #D4A3B3;
      margin-bottom: 8px;
    }
    .admin-container .subtitle {
      text-align: center;
      color: #d4c5c0;
      font-weight: 300;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .info-box {
      background: #2C0714;
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(212, 163, 179, 0.06);
    }
    .info-box .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.85rem;
      color: #d4c5c0;
    }
    .info-box .row .label { color: #7a5f5a; }
    .info-box .row .value { color: #f5edea; font-weight: 500; }
    .info-box .row .value.credits { color: #D4A3B3; font-weight: 700; font-size: 1.1rem; }
    .btn-reset {
      width: 100%;
      padding: 16px;
      background: #D4A3B3;
      color: #2C0714;
      border: none;
      border-radius: 40px;
      font-family: 'Work Sans', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
    }
    .btn-reset:hover {
      background: #c08b9e;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212, 163, 179, 0.3);
    }
    .btn-reset:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-voltar {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(212, 163, 179, 0.2);
      color: #d4c5c0;
      border-radius: 40px;
      cursor: pointer;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.85rem;
      transition: 0.3s;
      margin-top: 12px;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .btn-voltar:hover {
      border-color: #D4A3B3;
      color: #f5edea;
    }
    .status-msg {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      display: none;
      padding: 10px;
      border-radius: 12px;
    }
    .status-msg.success { 
      background: rgba(76, 175, 80, 0.15);
      color: #4CAF50; 
      display: block;
      border: 1px solid rgba(76, 175, 80, 0.2);
    }
    .status-msg.error { 
      background: rgba(212, 163, 179, 0.15);
      color: #D4A3B3; 
      display: block;
      border: 1px solid rgba(212, 163, 179, 0.2);
    }
    .status-msg.loading { 
      background: rgba(212, 163, 179, 0.1);
      color: #D4A3B3; 
      display: block;
      border: 1px solid rgba(212, 163, 179, 0.1);
    }
    .status-msg.info { 
      background: rgba(33, 150, 243, 0.15);
      color: #64B5F6; 
      display: block;
      border: 1px solid rgba(33, 150, 243, 0.2);
    }
    .debug-box {
      background: #1a0510;
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 12px;
      font-size: 0.7rem;
      color: #7a5f5a;
      border: 1px solid rgba(212,163,179,0.05);
      display: none;
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .debug-box.show { display: block; }
    .debug-box .error-text { color: #D4A3B3; }
    .debug-box .success-text { color: #4CAF50; }
    .debug-toggle {
      background: transparent;
      border: none;
      color: #7a5f5a;
      font-size: 0.6rem;
      cursor: pointer;
      margin-top: 4px;
      text-decoration: underline;
    }
    .debug-toggle:hover { color: #D4A3B3; }
    .credits-warning {
      text-align: center;
      font-size: 0.7rem;
      color: #7a5f5a;
      margin-top: 12px;
      padding: 8px;
      border-top: 1px solid rgba(212,163,179,0.06);
    }
    .credits-warning i {
      color: #D4A3B3;
      margin-right: 4px;
    }
    .admin-credentials {
      background: rgba(212, 163, 179, 0.05);
      border-radius: 12px;
      padding: 12px 16px;
      margin-top: 12px;
      border: 1px solid rgba(212, 163, 179, 0.08);
      font-size: 0.75rem;
    }
    .admin-credentials .label { color: #7a5f5a; }
    .admin-credentials .value { color: #D4A3B3; font-weight: 600; }
  </style>
</head>
<body>

<div class="admin-container">
  <h1>🔐 Admin</h1>
  <p class="subtitle">Resetar dados do cliente</p>
  
  <div class="info-box">
    <div class="row"><span class="label">👤 Cliente</span><span class="value">Lucille e Edson</span></div>
    <div class="row"><span class="label">🔑 Login</span><span class="value">lucille_e_edson</span></div>
    <div class="row"><span class="label">💰 Créditos atuais</span><span class="value credits" id="creditosAtuais">Carregando...</span></div>
    <div class="row"><span class="label">📥 Downloads</span><span class="value" id="downloadsAtuais">Carregando...</span></div>
  </div>
  
  <button class="btn-reset" id="btnReset" onclick="resetarCliente()">
    🔄 Resetar para 30 créditos
  </button>
  
  <div id="statusMsg" class="status-msg"></div>
  
  <div class="admin-credentials">
    <span class="label">🔐 Credenciais Admin:</span>
    <span class="value">admin@studio.com</span>
    <span style="color:#7a5f5a; margin:0 4px;">/</span>
    <span class="value">admin123</span>
  </div>
  
  <button class="debug-toggle" onclick="toggleDebug()">🔍 Ver detalhes técnicos</button>
  <div class="debug-box" id="debugBox"></div>
  
  <div class="credits-warning">
    <i class="fas fa-info-circle"></i> O reset afeta todos os dispositivos do cliente
  </div>
  
  <a href="https://studiorassi.github.io/home/index.html" class="btn-voltar">
    ← Voltar ao site
  </a>
</div>

<script>
  const API_BASE_URL = 'https://api-studiorassi.onrender.com';
  const btnReset = document.getElementById('btnReset');
  const statusMsg = document.getElementById('statusMsg');
  const creditosAtuais = document.getElementById('creditosAtuais');
  const downloadsAtuais = document.getElementById('downloadsAtuais');
  const debugBox = document.getElementById('debugBox');
  let debugLog = [];

  function addDebug(msg, type = 'info') {
    const time = new Date().toLocaleTimeString();
    const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
    debugLog.push(`[${time}] ${prefix} ${msg}`);
    debugBox.textContent = debugLog.join('\n');
    debugBox.classList.add('show');
    console.log(`[Admin] ${msg}`);
  }

  function toggleDebug() {
    debugBox.classList.toggle('show');
  }

  // ============================================================
  // TESTAR CONEXÃO COM O BACKEND
  // ============================================================
  async function testarConexao() {
    try {
      addDebug('🔍 Testando conexão com o backend...');
      const response = await fetch(`${API_BASE_URL}/api/health`);
      const data = await response.json();
      addDebug(`✅ Backend respondendo: ${JSON.stringify(data)}`, 'success');
      return true;
    } catch (error) {
      addDebug(`❌ Backend offline: ${error.message}`, 'error');
      return false;
    }
  }

  // ============================================================
  // LOGIN ADMIN
  // ============================================================
  async function loginAdmin() {
    try {
      addDebug('🔐 Tentando login como admin...');
      
      const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          email: 'admin@studio.com', 
          password: 'admin123' 
        })
      });
      
      addDebug(`📡 Status HTTP: ${response.status}`);
      
      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        addDebug(`❌ Resposta do servidor: ${JSON.stringify(errorData)}`, 'error');
        throw new Error(errorData.error || `Erro ${response.status}`);
      }
      
      const data = await response.json();
      addDebug(`✅ Login bem-sucedido! Usuário: ${data.user.name}`, 'success');
      return data.token;
      
    } catch (error) {
      addDebug(`❌ Falha no login: ${error.message}`, 'error');
      throw error;
    }
  }

  // ============================================================
  // BUSCAR DADOS DO CLIENTE
  // ============================================================
  async function buscarDadosCliente(token) {
    try {
      addDebug('🔍 Buscando lista de usuários...');
      
      const response = await fetch(`${API_BASE_URL}/api/auth/admin/users`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      addDebug(`📡 Status HTTP: ${response.status}`);
      
      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        addDebug(`❌ Erro: ${JSON.stringify(errorData)}`, 'error');
        throw new Error(errorData.error || `Erro ${response.status}`);
      }
      
      const data = await response.json();
      addDebug(`✅ ${data.users.length} usuários encontrados`, 'success');
      
      const cliente = data.users.find(u => u.email === 'lucille_e_edson');
      
      if (!cliente) {
        addDebug('❌ Cliente "lucille_e_edson" não encontrado!', 'error');
        throw new Error('Cliente não encontrado');
      }
      
      addDebug(`✅ Cliente: ID ${cliente.id}, Créditos: ${cliente.credits}`, 'success');
      return cliente;
      
    } catch (error) {
      addDebug(`❌ ${error.message}`, 'error');
      throw error;
    }
  }

  // ============================================================
  // CARREGAR INFORMAÇÕES
  // ============================================================
  async function carregarInfo() {
    try {
      creditosAtuais.textContent = '⏳...';
      downloadsAtuais.textContent = '⏳...';
      statusMsg.className = 'status-msg info';
      statusMsg.textContent = '⏳ Conectando...';
      
      const backendOk = await testarConexao();
      if (!backendOk) {
        throw new Error('Backend não está respondendo');
      }
      
      const token = await loginAdmin();
      const cliente = await buscarDadosCliente(token);
      
      creditosAtuais.textContent = cliente.credits;
      downloadsAtuais.textContent = '0';
      
      statusMsg.className = 'status-msg success';
      statusMsg.textContent = '✅ Dados carregados!';
      
      setTimeout(() => {
        statusMsg.className = 'status-msg';
        statusMsg.textContent = '';
      }, 3000);
      
    } catch (error) {
      console.error('❌ Erro:', error);
      creditosAtuais.textContent = '❌ Erro';
      downloadsAtuais.textContent = '❌ Erro';
      statusMsg.className = 'status-msg error';
      statusMsg.textContent = `⚠️ ${error.message}`;
    }
  }

  // ============================================================
  // RESETAR CLIENTE
  // ============================================================
  async function resetarCliente() {
    if (!confirm('⚠️ ATENÇÃO: Resetar créditos para 30 e limpar downloads. Continuar?')) {
      return;
    }
    
    btnReset.disabled = true;
    btnReset.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetando...';
    statusMsg.className = 'status-msg loading';
    statusMsg.textContent = '⏳ Resetando...';
    
    try {
      const token = await loginAdmin();
      const cliente = await buscarDadosCliente(token);
      
      addDebug(`📤 Resetando créditos para ${cliente.id}...`);
      
      const resetResponse = await fetch(`${API_BASE_URL}/api/auth/admin/restore-credits`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${token}` 
        },
        body: JSON.stringify({ 
          userId: cliente.id, 
          amount: 30 
        })
      });
      
      addDebug(`📡 Status reset: ${resetResponse.status}`);
      
      if (!resetResponse.ok) {
        const errorData = await resetResponse.json().catch(() => ({}));
        addDebug(`❌ Erro: ${JSON.stringify(errorData)}`, 'error');
        throw new Error(errorData.error || `Erro ${resetResponse.status}`);
      }
      
      const resetData = await resetResponse.json();
      addDebug(`✅ Reset concluído!`, 'success');
      
      creditosAtuais.textContent = '30';
      downloadsAtuais.textContent = '0';
      
      statusMsg.className = 'status-msg success';
      statusMsg.textContent = '✅ Resetado com sucesso!';
      
      btnReset.innerHTML = '✅ Feito!';
      
      setTimeout(() => {
        btnReset.innerHTML = '🔄 Resetar para 30 créditos';
        btnReset.disabled = false;
      }, 3000);
      
      alert(
        '✅ Cliente resetado!\n\n' +
        '📋 Login: lucille_e_edson\n' +
        '🔑 Senha: 072026_l&e\n' +
        '💰 Créditos: 30\n' +
        '📥 Downloads: 0'
      );
      
    } catch (error) {
      addDebug(`❌ ${error.message}`, 'error');
      statusMsg.className = 'status-msg error';
      statusMsg.textContent = `❌ ${error.message}`;
      btnReset.innerHTML = '🔄 Resetar para 30 créditos';
      btnReset.disabled = false;
    }
  }

  // ============================================================
  // INICIALIZAR
  // ============================================================
  carregarInfo();
</script>

</body>
</html>
