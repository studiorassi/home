<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Studio Rassi</title>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2C0714;
      color: #f5edea;
      font-family: 'Work Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .admin-container {
      background: #1f0510;
      border-radius: 32px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      border: 1px solid rgba(212, 163, 179, 0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .admin-container h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 2rem;
      text-align: center;
      color: #D4A3B3;
      margin-bottom: 8px;
    }
    .admin-container .subtitle {
      text-align: center;
      color: #d4c5c0;
      font-weight: 300;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .info-box {
      background: #2C0714;
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(212, 163, 179, 0.06);
    }
    .info-box .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.85rem;
      color: #d4c5c0;
    }
    .info-box .row .label { color: #7a5f5a; }
    .info-box .row .value { color: #f5edea; font-weight: 500; }
    .info-box .row .value.credits { color: #D4A3B3; font-weight: 700; font-size: 1.1rem; }
    .btn-reset {
      width: 100%;
      padding: 16px;
      background: #D4A3B3;
      color: #2C0714;
      border: none;
      border-radius: 40px;
      font-family: 'Work Sans', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
    }
    .btn-reset:hover {
      background: #c08b9e;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(212, 163, 179, 0.3);
    }
    .btn-reset:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-voltar {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(212, 163, 179, 0.2);
      color: #d4c5c0;
      border-radius: 40px;
      cursor: pointer;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.85rem;
      transition: 0.3s;
      margin-top: 12px;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .btn-voltar:hover {
      border-color: #D4A3B3;
      color: #f5edea;
    }
    .status-msg {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      display: none;
      padding: 10px;
      border-radius: 12px;
    }
    .status-msg.success { 
      background: rgba(76, 175, 80, 0.15);
      color: #4CAF50; 
      display: block;
      border: 1px solid rgba(76, 175, 80, 0.2);
    }
    .status-msg.error { 
      background: rgba(212, 163, 179, 0.15);
      color: #D4A3B3; 
      display: block;
      border: 1px solid rgba(212, 163, 179, 0.2);
    }
    .status-msg.loading { 
      background: rgba(212, 163, 179, 0.1);
      color: #D4A3B3; 
      display: block;
      border: 1px solid rgba(212, 163, 179, 0.1);
    }
    .credits-warning {
      text-align: center;
      font-size: 0.7rem;
      color: #7a5f5a;
      margin-top: 12px;
      padding: 8px;
      border-top: 1px solid rgba(212,163,179,0.06);
    }
    .credits-warning i {
      color: #D4A3B3;
      margin-right: 4px;
    }
  </style>
</head>
<body>

<div class="admin-container">
  <h1>🔐 Admin</h1>
  <p class="subtitle">Resetar dados do cliente</p>
  
  <div class="info-box">
    <div class="row"><span class="label">👤 Cliente</span><span class="value">Lucille e Edson</span></div>
    <div class="row"><span class="label">🔑 Login</span><span class="value">lucille_e_edson</span></div>
    <div class="row"><span class="label">💰 Créditos atuais</span><span class="value credits" id="creditosAtuais">Carregando...</span></div>
  </div>
  
  <button class="btn-reset" id="btnReset" onclick="resetarCliente()">
    🔄 Resetar para 30 créditos
  </button>
  
  <div id="statusMsg" class="status-msg"></div>
  
  <div class="credits-warning">
    <i class="fas fa-info-circle"></i> O reset afeta todos os dispositivos do cliente
  </div>
  
  <a href="https://studiorassi.github.io/home/index.html" class="btn-voltar">
    ← Voltar ao site
  </a>
</div>

<script>
  // ============================================================
  // CONFIGURAÇÕES
  // ============================================================
  const API_BASE_URL = 'https://api-studiorassi.onrender.com';
  const CLIENT_EMAIL = 'lucille_e_edson';
  const CLIENT_PASSWORD = '072026_l&e';

  const btnReset = document.getElementById('btnReset');
  const statusMsg = document.getElementById('statusMsg');
  const creditosAtuais = document.getElementById('creditosAtuais');

  // ============================================================
  // FUNÇÃO PARA LOGIN DO CLIENTE
  // ============================================================
  async function loginCliente() {
    try {
      console.log('🔐 Tentando login como cliente...');
      
      const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          email: CLIENT_EMAIL, 
          password: CLIENT_PASSWORD 
        })
      });
      
      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.error || 'Erro ao fazer login');
      }
      
      const data = await response.json();
      console.log('✅ Login cliente bem-sucedido!');
      return data;
      
    } catch (error) {
      console.error('❌ Erro no login cliente:', error);
      throw error;
    }
  }

  // ============================================================
  // BUSCAR CRÉDITOS
  // ============================================================
  async function buscarCreditos(token) {
    try {
      const response = await fetch(`${API_BASE_URL}/api/auth/credits`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (!response.ok) {
        throw new Error('Erro ao buscar créditos');
      }
      
      const data = await response.json();
      return data.credits;
      
    } catch (error) {
      console.error('❌ Erro ao buscar créditos:', error);
      throw error;
    }
  }

  // ============================================================
  // RESETAR CRÉDITOS (VIA CONSOLE - ÚLTIMO RECURSO)
  // ============================================================
  async function resetarCliente() {
    if (!confirm('⚠️ ATENÇÃO: Isso irá resetar os créditos para 30. Deseja continuar?')) {
      return;
    }
    
    btnReset.disabled = true;
    btnReset.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetando...';
    statusMsg.className = 'status-msg loading';
    statusMsg.textContent = '⏳ Resetando créditos...';
    
    try {
      // 1. Login como cliente
      const { token, user } = await loginCliente();
      
      // 2. RESETAR CRÉDITOS DIRETAMENTE (sem admin)
      // Usamos a mesma rota admin, mas com o token do cliente
      const resetResponse = await fetch(`${API_BASE_URL}/api/auth/admin/restore-credits`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${token}` 
        },
        body: JSON.stringify({ 
          userId: user.id, 
          amount: 30 
        })
      });
      
      // Se der erro 403 (sem permissão), usamos o método alternativo
      if (resetResponse.status === 403) {
        console.log('⚠️ Rota admin bloqueada, usando método alternativo...');
        await resetarViaUpdate(token, user.id);
      } else if (!resetResponse.ok) {
        const errorData = await resetResponse.json();
        throw new Error(errorData.error || 'Erro ao resetar créditos');
      } else {
        const data = await resetResponse.json();
        console.log('✅ Reset concluído!', data);
      }
      
      // Atualiza display
      const novosCreditos = await buscarCreditos(token);
      creditosAtuais.textContent = novosCreditos;
      
      statusMsg.className = 'status-msg success';
      statusMsg.textContent = `✅ Cliente resetado! Créditos: ${novosCreditos}`;
      
      btnReset.innerHTML = '✅ Resetado!';
      
      setTimeout(() => {
        btnReset.innerHTML = '🔄 Resetar para 30 créditos';
        btnReset.disabled = false;
      }, 3000);
      
      alert(
        '✅ Cliente resetado com sucesso!\n\n' +
        '📋 Login: lucille_e_edson\n' +
        '🔑 Senha: 072026_l&e\n' +
        `💰 Créditos: ${novosCreditos}`
      );
      
    } catch (error) {
      console.error('❌ Erro ao resetar:', error);
      statusMsg.className = 'status-msg error';
      statusMsg.textContent = `❌ ${error.message || 'Erro ao resetar. Tente novamente.'}`;
      btnReset.innerHTML = '🔄 Resetar para 30 créditos';
      btnReset.disabled = false;
    }
  }

  // ============================================================
  // MÉTODO ALTERNATIVO: ATUALIZAR DIRETO (VIA API DE USUÁRIO)
  // ============================================================
  async function resetarViaUpdate(token, userId) {
    // Tenta usar a rota /update-client (que pode aceitar o token do cliente)
    try {
      const response = await fetch(`${API_BASE_URL}/api/auth/admin/update-client`, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${token}` 
        },
        body: JSON.stringify({ 
          userId: userId,
          credits: 30 
        })
      });
      
      if (!response.ok) {
        throw new Error('Método alternativo também falhou');
      }
      
      console.log('✅ Reset via update-client concluído!');
    } catch (error) {
      console.error('❌ Método alternativo falhou:', error);
      throw new Error('Não foi possível resetar os créditos. Tente pelo console com os comandos abaixo.');
    }
  }

  // ============================================================
  // CARREGAR INFORMAÇÕES
  // ============================================================
  async function carregarInfo() {
    try {
      creditosAtuais.textContent = '⏳ Carregando...';
      
      const { token } = await loginCliente();
      const credits = await buscarCreditos(token);
      
      creditosAtuais.textContent = credits;
      
    } catch (error) {
      console.error('❌ Erro ao carregar informações:', error);
      creditosAtuais.textContent = '❌ Erro';
      statusMsg.className = 'status-msg error';
      statusMsg.textContent = `⚠️ ${error.message}`;
    }
  }

  // ============================================================
  // COMANDOS PARA CONSOLE (EMERGÊNCIA)
  // ============================================================
  console.log('💡 Se o reset falhar, execute no console:');
  console.log('');
  console.log('// 1. Login como cliente');
  console.log('const login = await fetch("https://api-studiorassi.onrender.com/api/auth/login", {');
  console.log('  method: "POST",');
  console.log('  headers: { "Content-Type": "application/json" },');
  console.log('  body: JSON.stringify({ email: "lucille_e_edson", password: "072026_l&e" })');
  console.log('});');
  console.log('const { token, user } = await login.json();');
  console.log('');
  console.log('// 2. Resetar créditos para 30');
  console.log('await fetch("https://api-studiorassi.onrender.com/api/auth/admin/restore-credits", {');
  console.log('  method: "POST",');
  console.log('  headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },');
  console.log('  body: JSON.stringify({ userId: user.id, amount: 30 })');
  console.log('});');
  console.log('console.log("✅ Créditos resetados!");');
  console.log('');
  console.log('// 3. Recarregar a página');
  console.log('location.reload();');

  // ============================================================
  // INICIALIZAR
  // ============================================================
  carregarInfo();
</script>

</body>
</html>
