<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Rassi · Acesse suas fotos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Brittany+Signature&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2C0714;
      color: #f5edea;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 30% 50%, rgba(212,163,179,0.05) 0%, transparent 60%);
    }
    .login-container {
      background: #1f0510;
      border-radius: 40px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      border: 1px solid rgba(212, 163, 179, 0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-header .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #f5edea;
      text-decoration: none;
    }
    .login-header .logo span { color: #D4A3B3; }
    .login-header p {
      color: #d4c5c0;
      font-weight: 300;
      font-size: 0.9rem;
      margin-top: 8px;
    }
    .login-header .icon-lock {
      font-size: 3rem;
      color: #D4A3B3;
      margin-bottom: 8px;
      display: block;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #d4c5c0;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .input-dark {
      background: #2C0714;
      border: 1px solid rgba(212, 163, 179, 0.15);
      padding: 14px 18px;
      border-radius: 40px;
      color: #f5edea;
      font-family: 'Montserrat', sans-serif;
      width: 100%;
      font-size: 0.95rem;
      transition: 0.3s;
    }
    .input-dark:focus {
      outline: none;
      border-color: #D4A3B3;
      box-shadow: 0 0 0 3px rgba(212, 163, 179, 0.1);
    }
    .input-dark::placeholder { color: #7a5f5a; }
    .btn-login {
      width: 100%;
      padding: 16px;
      background: #D4A3B3;
      color: #2C0714;
      border: none;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
    }
    .btn-login:hover {
      background: #c08b9e;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212, 163, 179, 0.3);
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.8rem;
      color: #7a5f5a;
    }
    .login-footer a {
      color: #D4A3B3;
      text-decoration: none;
      font-weight: 500;
    }
    .login-footer a:hover { text-decoration: underline; }
    .back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #d4c5c0;
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 20px;
      transition: 0.3s;
    }
    .back-home:hover { color: #D4A3B3; }
  </style>
</head>
<body>
  <div class="login-container">
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Voltar ao site</a>
    
    <div class="login-header">
      <i class="fas fa-lock icon-lock"></i>
      <div class="logo">Studio <span>Rassi</span></div>
      <p>Acesse suas memórias eternizadas</p>
    </div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label><i class="fas fa-envelope" style="color:#D4A3B3; margin-right:6px;"></i> E-mail</label>
        <input type="email" class="input-dark" placeholder="seu@email.com" value="cliente@studio.com" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-key" style="color:#D4A3B3; margin-right:6px;"></i> Senha</label>
        <input type="password" class="input-dark" placeholder="••••••••" value="123456" required>
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt"></i> Entrar e ver minhas fotos
      </button>
    </form>

    <div class="login-footer">
      <p>Esqueceu sua senha? <a href="#">Recuperar acesso</a></p>
      <p style="margin-top:8px; font-size:0.7rem;">🔒 Ambiente seguro com proteção de imagens</p>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      // Simulação de login - redireciona para a área do cliente
      window.location.href = 'cliente.html';
      return false;
    }
  </script>
</body>
</html>
