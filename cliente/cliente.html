<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Fotos · Studio Rassi</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Work+Sans:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    /* ===== RESET ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2C0714;
      color: #f5edea;
      font-family: 'Work Sans', sans-serif;
      min-height: 100vh;
      padding-top: 80px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 12px 0;
      background: rgba(44, 7, 20, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(212, 163, 179, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .navbar.scrolled {
      padding: 8px 0;
      background: rgba(44, 7, 20, 0.96);
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.5);
    }
    .navbar.hidden {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }
    .navbar-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo {
      display: inline-block;
      line-height: 0;
      text-decoration: none;
    }
    .logo img {
      display: block;
      width: auto;
      height: 45px;
      max-width: 150px;
      transition: all 0.3s ease;
    }
    .navbar.scrolled .logo img { height: 40px; }
    .logo img:hover { opacity: 0.85; transform: scale(1.02); }
    .nav-info {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .nav-info .user {
      color: #d4c5c0;
      font-size: 0.85rem;
    }
    .nav-info .user i { color: #D4A3B3; margin-right: 6px; }
    .btn-logout {
      background: transparent;
      border: 1px solid rgba(212, 163, 179, 0.2);
      color: #d4c5c0;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.3s;
    }
    .btn-logout:hover {
      border-color: #D4A3B3;
      color: #D4A3B3;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px;
      z-index: 1001;
    }
    .hamburger span {
      display: block;
      width: 28px;
      height: 2px;
      background: #f5edea;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      max-width: 380px;
      height: 100vh;
      background: rgba(44, 7, 20, 0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 999;
      padding: 80px 28px 40px;
      box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      border-left: 1px solid rgba(212, 163, 179, 0.08);
    }
    .mobile-menu.open { transform: translateX(0); }
    .mobile-menu .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
      display: none;
    }
    .mobile-menu.open .menu-overlay { display: block; }

    .mobile-menu .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(212, 163, 179, 0.08);
    }
    .mobile-menu .menu-header .user-info {
      font-size: 0.9rem;
      color: #d4c5c0;
    }
    .mobile-menu .menu-header .user-info strong {
      color: #f5edea;
      display: block;
      font-size: 1.1rem;
      margin-top: 4px;
    }
    .mobile-menu .menu-header .close-menu {
      background: transparent;
      border: none;
      color: #f5edea;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 8px;
      transition: 0.3s;
    }
    .mobile-menu .menu-header .close-menu:hover {
      color: #D4A3B3;
      transform: rotate(90deg);
    }

    .mobile-menu .menu-status {
      background: rgba(31, 5, 16, 0.6);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 24px;
      border: 1px solid rgba(212, 163, 179, 0.06);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .mobile-menu .menu-status .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #d4c5c0;
    }
    .mobile-menu .menu-status .status-row .label {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mobile-menu .menu-status .status-row .label i {
      color: #D4A3B3;
      font-size: 1rem;
    }
    .mobile-menu .menu-status .status-row .value {
      color: #D4A3B3;
      font-weight: 600;
      font-size: 1rem;
    }
    .mobile-menu .menu-status .status-row .value.timer {
      font-variant-numeric: tabular-nums;
      min-width: 80px;
      text-align: right;
    }

    .mobile-menu .menu-credit-cta-mobile {
      background: #D4A3B3;
      color: #2C0714;
      padding: 12px 20px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Work Sans', sans-serif;
      width: 100%;
      margin-top: 8px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .mobile-menu .menu-credit-cta-mobile:hover {
      background: #c08b9e;
      transform: scale(1.02);
    }
    .mobile-menu .menu-credit-cta-mobile.show { display: flex; }

    .mobile-menu .menu-links {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
    }
    .mobile-menu .menu-links a {
      color: #d4c5c0;
      text-decoration: none;
      padding: 14px 16px;
      border-radius: 12px;
      transition: 0.3s;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mobile-menu .menu-links a i {
      color: #D4A3B3;
      width: 20px;
      text-align: center;
    }
    .mobile-menu .menu-links a:hover {
      background: rgba(212, 163, 179, 0.08);
      color: #f5edea;
    }
    .mobile-menu .menu-links .logout-link {
      margin-top: 12px;
      border-top: 1px solid rgba(212, 163, 179, 0.06);
      padding-top: 16px;
      color: #7a5f5a;
    }
    .mobile-menu .menu-links .logout-link:hover {
      color: #D4A3B3;
      background: transparent;
    }

    .menu-credit-cta {
      display: none;
      background: #D4A3B3;
      color: #2C0714;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.7rem;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Work Sans', sans-serif;
      white-space: nowrap;
    }
    .menu-credit-cta:hover {
      background: #c08b9e;
      transform: scale(1.05);
    }
    .menu-credit-cta.show { display: inline-block; }

    .floating-status {
      position: sticky;
      top: 72px;
      z-index: 99;
      background: rgba(44, 7, 20, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(212, 163, 179, 0.06);
      padding: 12px 0;
      margin-bottom: 24px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
    }
    .floating-status .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 32px;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #d4c5c0;
    }
    .status-item i {
      color: #D4A3B3;
      font-size: 1.1rem;
    }
    .status-item .value {
      color: #D4A3B3;
      font-weight: 600;
      font-size: 1.1rem;
    }
    .status-item .timer {
      color: #D4A3B3;
      font-weight: 600;
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
      min-width: 80px;
      display: inline-block;
    }

    /* ===== PROGRESS BAR (CARREGAMENTO DA GALERIA) ===== */
    .progress-bar-container {
      position: sticky;
      top: 132px;
      z-index: 98;
      background: rgba(31, 5, 16, 0.6);
      backdrop-filter: blur(8px);
      padding: 8px 0;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(212, 163, 179, 0.06);
      display: none;
    }
    .progress-bar-container .container {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .progress-bar-container .progress-track {
      flex: 1;
      height: 6px;
      background: rgba(212, 163, 179, 0.12);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar-container .progress-track .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #D4A3B3, #f5edea);
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    .progress-bar-container .progress-label {
      font-size: 0.75rem;
      color: #d4c5c0;
      white-space: nowrap;
      min-width: 90px;
      text-align: right;
    }
    .progress-bar-container .progress-label strong {
      color: #D4A3B3;
    }

    .credits-info {
      background: rgba(31, 5, 16, 0.6);
      border-radius: 16px;
      padding: 16px 20px;
      margin: 12px auto 8px;
      max-width: 700px;
      border: 1px solid rgba(212, 163, 179, 0.06);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px 16px;
      text-align: center;
    }
    .credits-info .heart {
      color: #D4A3B3;
      font-size: 1.1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .credits-info .label {
      font-family: 'Work Sans', sans-serif;
      font-size: 0.8rem;
      color: #d4c5c0;
      font-weight: 300;
    }
    .credits-info .label strong {
      color: #D4A3B3;
      font-weight: 600;
    }
    .credits-info .highlight {
      color: #D4A3B3;
      font-weight: 500;
    }

    .skeleton {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a0510 25%, #2C0714 50%, #1a0510 75%);
      background-size: 400% 400%;
      animation: skeletonLoading 1.5s ease-in-out infinite;
      z-index: 1;
      border-radius: 20px;
    }
    @keyframes skeletonLoading {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .skeleton .spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #D4A3B3;
      font-size: 1.5rem;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin: 16px 0 20px;
    }
    .gallery-header h2 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.6rem;
      letter-spacing: -0.02em;
    }
    .gallery-header h2 span { color: #D4A3B3; }
    .watermark-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    .watermark-item {
      background: #1f0510;
      border-radius: 20px;
      padding: 0;
      text-align: center;
      border: 1px solid rgba(212, 163, 179, 0.06);
      position: relative;
      user-select: none;
      transition: 0.3s;
      overflow: hidden;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      cursor: pointer;
    }
    .watermark-item:hover {
      border-color: rgba(212, 163, 179, 0.2);
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .watermark-item .real-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      cursor: pointer;
      z-index: 2;
      transition: opacity 0.5s ease, transform 0.3s ease;
    }
    .watermark-item .real-image.loaded { opacity: 0.85; }
    .watermark-item .real-image:hover { transform: scale(1.03); }
    .watermark-item::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(to top, rgba(44, 7, 20, 0.95), transparent);
      z-index: 3;
      pointer-events: none;
    }
    .watermark-item .watermark-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-20deg);
      opacity: 0.12;
      pointer-events: none;
      user-select: none;
      width: 120px;
      height: auto;
      filter: brightness(0) invert(1) drop-shadow(0 0 20px rgba(0,0,0,0.5));
      z-index: 1;
    }
    .watermark-item .watermark-text {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.5rem;
      font-weight: 400;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      background: rgba(0,0,0,0.4);
      padding: 3px 10px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      pointer-events: none;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 4;
    }

    .watermark-item .badge-status {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 0.65rem;
      padding: 6px 10px;
      border-radius: 50%;
      backdrop-filter: blur(4px);
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.3s ease;
      font-family: 'Work Sans', sans-serif;
      font-weight: 600;
      border: none;
      cursor: default;
      min-width: 32px;
      min-height: 32px;
    }
    .watermark-item .badge-status.locked {
      background: rgba(44, 7, 20, 0.8);
      color: #D4A3B3;
      border: 1px solid rgba(212, 163, 179, 0.2);
    }
    .watermark-item .badge-status.downloaded {
      background: rgba(46, 125, 50, 0.9);
      color: #ffffff;
      border: 1px solid rgba(76, 175, 80, 0.4);
      box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.6rem;
      cursor: default;
      min-width: auto;
    }
    .watermark-item .badge-status.downloaded i {
      font-size: 0.7rem;
      margin-right: 4px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(8px);
      padding: 20px;
    }
    .modal-overlay.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .modal-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .modal-content .watermark-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    .modal-content .watermark-container .watermark-logo-modal {
      width: 80%;
      max-width: 700px;
      height: auto;
      user-select: none;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .modal-content .watermark-container .watermark-logo-modal {
        width: 85%;
        max-width: 500px;
      }
    }

    @media (max-width: 480px) {
      .modal-content .watermark-container .watermark-logo-modal {
        width: 90%;
        max-width: 350px;
      }
    }

    .modal-content .modal-image {
      width: auto;
      height: auto;
      max-width: 90vw;
      max-height: 75vh;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(212, 163, 179, 0.1);
      opacity: 0;
      transition: opacity 0.5s ease;
      position: relative;
      z-index: 1;
    }
    .modal-content .modal-image.loaded {
      opacity: 1;
    }

    .modal-close {
      position: absolute;
      top: -40px;
      right: -40px;
      background: rgba(44, 7, 20, 0.8);
      border: 1px solid rgba(212, 163, 179, 0.2);
      color: #f5edea;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal-close:hover {
      background: #D4A3B3;
      color: #2C0714;
      transform: rotate(90deg);
    }

    .modal-progress {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      max-width: 300px;
      background: rgba(44, 7, 20, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 8px 16px;
      display: none;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(212, 163, 179, 0.1);
      z-index: 10;
    }
    .modal-progress.show { display: flex; }
    .modal-progress .track {
      flex: 1;
      height: 4px;
      background: rgba(212, 163, 179, 0.15);
      border-radius: 10px;
      overflow: hidden;
    }
    .modal-progress .track .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #D4A3B3, #f5edea);
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    .modal-progress .label {
      font-size: 0.65rem;
      color: #d4c5c0;
      white-space: nowrap;
      min-width: 35px;
    }

    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(44, 7, 20, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(212, 163, 179, 0.15);
      color: #f5edea;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      z-index: 10;
    }
    .modal-nav:hover {
      background: #D4A3B3;
      color: #2C0714;
      transform: translateY(-50%) scale(1.1);
    }
    .modal-nav.prev { left: -24px; }
    .modal-nav.next { right: -24px; }
    .modal-nav:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: translateY(-50%) scale(1);
    }

    .modal-counter {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(44, 7, 20, 0.7);
      backdrop-filter: blur(8px);
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #D4A3B3;
      border: 1px solid rgba(212, 163, 179, 0.1);
      z-index: 10;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .modal-counter span {
