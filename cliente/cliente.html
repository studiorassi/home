<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <!-- ===== MARCA D'ÁGUA (90% DA IMAGEM) ===== -->
    <div class="watermark-modal">
      <img src="assets/images/logo/logo_branco.png" alt="Studio Rassi" class="watermark-modal-logo">
    </div>
    
    <!-- Progress Bar da Imagem -->
    <div class="modal-progress" id="modalProgress">
      <span style="font-size:0.7rem; color:#D4A3B3;"><i class="fas fa-spinner fa-spin"></i></span>
      <div class="track">
        <div class="fill" id="modalProgressFill"></div>
      </div>
      <span class="label" id="modalProgressLabel">0%</span>
    </div>
    
    <!-- Contador -->
    <div class="modal-counter" id="modalCounter">
      <span id="currentIndexDisplay">1</span> de <span id="totalCountDisplay">116</span>
    </div>
    
    <!-- Navegação -->
    <button class="modal-nav prev" id="modalPrev" onclick="navigateModal(-1)">
      <i class="fas fa-chevron-left"></i>
    </button>
    <button class="modal-nav next" id="modalNext" onclick="navigateModal(1)">
      <i class="fas fa-chevron-right"></i>
    </button>
    
    <!-- Fechar -->
    <button class="modal-close" onclick="closeModal()">
      <i class="fas fa-times"></i>
    </button>
    
    <!-- Imagem -->
    <img id="modalImage" src="" alt="Foto em alta resolução">
    
    <!-- Ações do Modal -->
    <div class="modal-actions">
      <button class="modal-btn-download" id="modalDownloadBtn" onclick="downloadFromModal()">
        <i class="fas fa-download"></i> Baixar imagem em alta definição = utilizar 1 crédito
      </button>
      
      <div class="modal-buy-credits" id="modalBuyCredits">
        <div class="buy-title">
          <i class="fas fa-crown"></i> + Quer mais fotos?
        </div>
        <div class="buy-packages">
          <div class="buy-package" onclick="buyCredits(5)">
            <div class="label">5 créditos</div>
            <div class="price">R$ 40</div>
          </div>
          <div class="buy-package" onclick="buyCredits(10)">
            <div class="label">10 créditos</div>
            <div class="price">R$ 80</div>
          </div>
          <div class="buy-package" onclick="buyCredits(20)">
            <div class="label">20 créditos</div>
            <div class="price">R$ 160</div>
          </div>
          <div class="buy-package" onclick="buyCredits(50)">
            <div class="label">50 créditos</div>
            <div class="price">R$ 400</div>
          </div>
        </div>
        <button class="buy-close" onclick="closeModal()">Fechar</button>
      </div>
    </div>
    
    <div class="modal-credits" id="modalCredits">
      Créditos restantes: <strong id="modalCreditsCount">30</strong>
    </div>
  </div>
</div>
